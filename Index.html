<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:'Share Tech Mono',monospace;color:#fff;cursor:none;background:#000;}

#cur{position:fixed;width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .15s,height .15s;}
#cur2{position:fixed;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.2);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}

#c{position:fixed;inset:0;z-index:0;}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:300;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
  pointer-events:none;
}
#ibar-wrap{
  width:160px;height:1px;
  background:rgba(255,255,255,.1);
  overflow:visible;position:relative;
}
#ibar{
  position:absolute;left:0;top:0;height:1px;
  width:0%;background:#fff;
  box-shadow:0 0 12px #fff, 0 0 30px rgba(255,255,255,.4);
  transition:none;
}
#itext{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:4.5rem;letter-spacing:24px;
  color:#fff;opacity:0;
  text-shadow:0 0 40px rgba(255,255,255,.3);
  transform:scale(.85);
}
#isub{
  font-size:.55rem;letter-spacing:8px;
  color:rgba(255,255,255,.25);opacity:0;
  text-transform:uppercase;
}

/* ── SCENE ── */
#scene{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 20px 80px;
  perspective:1200px;
  perspective-origin:50% 40%;
  opacity:0;
}

.stage{
  width:100%;max-width:440px;
  display:flex;flex-direction:column;align-items:center;
  transform-style:preserve-3d;
}

/* ── RING ── */
.ring-wrap{
  position:relative;width:110px;height:110px;
  margin-bottom:32px;
  transform-style:preserve-3d;
  opacity:0;
}
.ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent;}
.ring:nth-child(1){border-color:rgba(255,255,255,.55) transparent transparent transparent;}
.ring:nth-child(2){border-color:transparent rgba(255,255,255,.38) transparent transparent;}
.ring:nth-child(3){border-color:transparent transparent rgba(255,255,255,.44) transparent;}
.ring:nth-child(4){border-color:rgba(255,255,255,.28) transparent transparent transparent;}

.av{
  position:absolute;inset:12px;border-radius:50%;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:2rem;
  color:rgba(255,255,255,.9);
  text-shadow:0 0 24px rgba(255,255,255,.5);
  box-shadow:inset 0 0 30px rgba(255,255,255,.04), 0 0 40px rgba(255,255,255,.04);
}

/* ── TITLE ── */
.title-block{text-align:center;margin-bottom:34px;opacity:0;}
.eye{font-size:.54rem;letter-spacing:8px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:12px;}
h1{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:4.5rem;letter-spacing:22px;
  color:#fff;position:relative;display:inline-block;
  text-shadow:0 0 80px rgba(255,255,255,.12);
}
h1::before,h1::after{content:attr(data-text);position:absolute;top:0;left:0;color:#fff;}
h1::before{clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:ga 7s infinite;opacity:0;}
h1::after{clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);animation:gb 7s infinite;opacity:0;}
@keyframes ga{0%,88%,100%{opacity:0;}90%{transform:translateX(-4px);opacity:.5;}92%{transform:translateX(4px);opacity:.3;}94%{opacity:0;}}
@keyframes gb{0%,89%,100%{opacity:0;}91%{transform:translateX(4px);opacity:.4;}93%{transform:translateX(-3px);opacity:.25;}95%{opacity:0;}}
.tag{font-size:.56rem;letter-spacing:4px;color:rgba(255,255,255,.13);margin-top:8px;text-transform:uppercase;}

/* ── SOCIALS ── */
.soc-row{display:flex;gap:13px;margin-bottom:28px;opacity:0;}
.soc{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.08rem;text-decoration:none;color:rgba(255,255,255,.5);
  background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(16px);
  transition:background .3s,border-color .3s,color .3s,box-shadow .3s;
  cursor:none;position:relative;overflow:hidden;
}
.soc::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:14px 14px 0 0;pointer-events:none;}
.soc:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.25);color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15);}

/* ── CARDS ── */
.links{width:100%;display:flex;flex-direction:column;gap:9px;}
.card{
  display:flex;align-items:center;text-decoration:none;color:#fff;
  padding:15px 20px;border-radius:18px;
  background:rgba(255,255,255,.052);
  border:1px solid rgba(255,255,255,.085);
  backdrop-filter:blur(24px) saturate(150%);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.07);
  transition:background .3s,border-color .3s,box-shadow .35s;
  cursor:none;position:relative;overflow:hidden;
  opacity:0;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:18px 18px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.065),transparent);pointer-events:none;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.045) 50%,transparent 62%);transform:translateX(-130%);transition:transform .55s ease;pointer-events:none;}
.card:hover::after{transform:translateX(160%);}
.card:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.16);box-shadow:0 12px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);}

.ci{
  width:42px;height:42px;border-radius:12px;

  font-size:1.05rem;color:rgba(255,255,255,.5);
  margin-right:16px;flex-shrink:0;position:relative;overflow:hidden;
  backdrop-filter:blur(8px);transition:all .3s;
}
.ci::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:12px 12px 0 0;}
.ci i,.ci .gi{position:relative;z-index:1;transition:text-shadow .3s;}
.card:hover .ci{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.22);color:#fff;}
.card:hover .ci i,.card:hover .ci .gi{text-shadow:0 0 18px rgba(255,255,255,.7);}
.gi{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.88rem;transform:rotate(-10deg) skewX(-5deg);display:block;}

.ct{flex:1;display:flex;flex-direction:column;gap:1px;}
.cs{font-size:.5rem;letter-spacing:3px;color:rgba(255,255,255,.2);text-transform:uppercase;transition:color .3s;}
.card:hover .cs{color:rgba(255,255,255,.38);}
.cn{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,.58);transition:color .3s,text-shadow .3s;}
.card:hover .cn{color:#fff;text-shadow:0 0 18px rgba(255,255,255,.3);}

.ca{margin-left:auto;display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.1);font-size:.58rem;transition:all .3s;transform:translateX(-3px);}
.al{width:15px;height:1px;background:rgba(255,255,255,.1);transition:all .3s;}
.card:hover .ca{color:rgba(255,255,255,.55);transform:translateX(4px);}
.card:hover .al{background:rgba(255,255,255,.45);width:23px;}

/* ── FOOTER ── */
.foot{margin-top:34px;font-size:.46rem;letter-spacing:5px;color:rgba(255,255,255,.07);text-transform:uppercase;text-align:center;opacity:0;}

/* ── MUSIC ── */
#music{
  position:fixed;bottom:22px;right:22px;z-index:100;

  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.09);

  font-size:.59rem;letter-spacing:1px;color:rgba(255,255,255,.28);

  box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);
  opacity:0;
}
#music:hover{border-color:rgba(255,255,255,.22);color:rgba(255,255,255,.65);}
.npd{width:5px;height:5px;border-radius:50%;background:#fff;opacity:0;transition:opacity .3s;animation:blink 1.4s ease-in-out infinite;}
.npd.on{opacity:1;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.08;}}
.eq{display:flex;align-items:flex-end;gap:2px;height:13px;}
.eq span{display:block;width:2px;background:#fff;border-radius:1px;opacity:0;transition:opacity .3s;animation:eqb .7s ease-in-out infinite alternate;}
.eq span:nth-child(1){height:5px;}.eq span:nth-child(2){height:11px;animation-delay:.1s;}.eq span:nth-child(3){height:7px;animation-delay:.2s;}.eq span:nth-child(4){height:13px;animation-delay:.08s;}.eq span:nth-child(5){height:4px;animation-delay:.18s;}
.eq.on span{opacity:.65;}
@keyframes eqb{from{transform:scaleY(.15);}to{transform:scaleY(1);}}
#player{display:none;}
</style>

<script>
/* ════════════════════════════════════════
   EASING FUNCTIONS
════════════════════════════════════════ */
const E = {
  outExpo:    t => t>=1 ? 1 : 1-Math.pow(2,-10*t),
  outBack:    t => { const c=1.70158+1; return 1+c*Math.pow(t-1,3)+(c-1)*Math.pow(t-1,2); },
  outElastic: t => t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1,
  outBounce:  t => {
    const n=7.5625, d=2.75;
    if(t<1/d) return n*t*t;
    if(t<2/d) return n*(t-=1.5/d)*t+.75;
    if(t<2.5/d) return n*(t-=2.25/d)*t+.9375;
    return n*(t-=2.625/d)*t+.984375;
  },
  outQuart:   t => 1-Math.pow(1-t,4),
  outCubic:   t => 1-Math.pow(1-t,3),
  inOutQuart: t => t<.5 ? 8*t*t*t*t : 1-Math.pow(-2*t+2,4)/2,
  inExpo:     t => t===0 ? 0 : Math.pow(2,10*t-10),
  inOutCubic: t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2,
  spring:     t => Math.sin(t*Math.PI*(0.2+2.5*t*t*t))*Math.pow(1-t,2.2)+t,
};

/* core animator */
function anim({from,to,ms,ease=E.outExpo,delay=0,tick,done}){
  const t0 = performance.now()+delay;
  const run = now => {
    if(now<t0){requestAnimationFrame(run);return;}
    const p = Math.min((now-t0)/ms, 1);
    tick(from+(to-from)*ease(p), p);
    if(p<1) requestAnimationFrame(run);
    else if(done) done();
  };
  requestAnimationFrame(run);
}

const S = (el,o) => Object.assign(el.style, o);

/* ════════════════════════════════════════
   CURSOR
════════════════════════════════════════ */
const curA=document.getElementById('cur'), curB=document.getElementById('cur2');
let mx=0,my=0,lx=0,ly=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curA.style.left=mx+'px';curA.style.top=my+'px';});
(function lp(){lx+=(mx-lx)*.12;ly+=(my-ly)*.12;curB.style.left=lx+'px';curB.style.top=ly+'px';requestAnimationFrame(lp);})();
document.querySelectorAll('.card,.soc,#music').forEach(el=>{
  el.addEventListener('mouseenter',()=>{curA.style.width='16px';curA.style.height='16px';});
  el.addEventListener('mouseleave',()=>{curA.style.width='8px';curA.style.height='8px';});
});

/* ════════════════════════════════════════
   STAR CANVAS
════════════════════════════════════════ */
(()=>{
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  const rsz=()=>{cv.width=innerWidth;cv.height=innerHeight;};
  rsz(); window.addEventListener('resize',rsz);

  /* layered star depth */
  const layers = [
    {count:180, rMin:.2, rMax:.9,  opMin:.1, opMax:.6, spd:.00005},
    {count:100, rMin:.5, rMax:1.4, opMin:.2, opMax:.9, spd:.00012},
    {count: 40, rMin:.8, rMax:2.0, opMin:.4, opMax:1,  spd:.00022},
  ];
  const stars = layers.flatMap(L=>Array.from({length:L.count},()=>({
    x:Math.random(), y:Math.random(),
    r:L.rMin+Math.random()*(L.rMax-L.rMin),
    op:L.opMin+Math.random()*(L.opMax-L.opMin),
    tw:1+Math.random()*4, tp:Math.random()*Math.PI*2,
    spd:L.spd,
  })));

  /* shooting stars pool */
  const mk=()=>({x:Math.random()*.7,y:Math.random()*.5,t:0,op:0,len:80+Math.random()*140,speed:.003+Math.random()*.006,dead:false,delay:Math.random()*400});
  const shots=[mk(),mk(),mk()];

  /* subtle nebulae */
  const neb=[
    {x:.1,y:.15,r:.25,h:220,op:.04},
    {x:.88,y:.78,r:.2,h:195,op:.03},
    {x:.5,y:.4,r:.15,h:265,op:.025},
  ];

  let reveal=0, t=0;
  window._starReveal = v=>{reveal=v;};

  const frame=()=>{
    t+=.013;
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    /* nebulae */
    neb.forEach(n=>{
      const R=n.r*Math.max(W,H);
      const g=ctx.createRadialGradient(n.x*W,n.y*H,0,n.x*W,n.y*H,R);
      g.addColorStop(0,`hsla(${n.h},50%,65%,${n.op*reveal})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x*W,n.y*H,R,0,Math.PI*2);ctx.fill();
    });

    /* stars — drift very slowly downward per layer depth */
    stars.forEach(s=>{
      s.y += s.spd;
      if(s.y>1){s.y=0;s.x=Math.random();}
      const tw=.5+.5*Math.sin(t*s.tw+s.tp);
      const op=s.op*(.6+.4*tw)*reveal;
      ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r*(1+.15*tw),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${op})`;ctx.fill();
    });

    /* shooting stars */
    shots.forEach((s,i)=>{
      if(s.delay>0){s.delay--;return;}
      s.t+=s.speed;
      const px=(s.x+s.t)*W, py=(s.y+s.t*.22)*H;
      s.op = s.t<.5 ? Math.min(1,s.t*4) : Math.max(0,1-(s.t-.5)*4);
      if(s.t>1||s.op<=0){shots[i]=mk();return;}
      const g=ctx.createLinearGradient(px-s.len,py-s.len*.22,px,py);
      g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(255,255,255,${s.op*.5*reveal})`);
      ctx.save();ctx.strokeStyle=g;ctx.lineWidth=1.1;
      ctx.beginPath();ctx.moveTo(px-s.len,py-s.len*.22);ctx.lineTo(px,py);ctx.stroke();ctx.restore();
    });

    requestAnimationFrame(frame);
  };
  frame();
})();

/* ════════════════════════════════════════
   INTRO SEQUENCE
════════════════════════════════════════ */
(()=>{
  const intro  = document.getElementById('intro');
  const itext  = document.getElementById('itext');
  const isub   = document.getElementById('isub');
  const ibar   = document.getElementById('ibar');
  const scene  = document.getElementById('scene');
  const elRing = document.getElementById('elRing');
  const elTitle= document.getElementById('elTitle');
  const elSoc  = document.getElementById('elSoc');
  const elFoot = document.getElementById('elFoot');
  const music  = document.getElementById('music');
  const h1     = document.querySelector('h1');
  const eye    = document.querySelector('.eye');
  const tag    = document.querySelector('.tag');
  const socs   = document.querySelectorAll('.soc');
  const cards  = document.querySelectorAll('.card');

  /* pre-hide */
  [elTitle,elSoc,elFoot].forEach(e=>S(e,{opacity:'0'}));
  cards.forEach(c=>S(c,{opacity:'0'}));
  S(elRing,{opacity:'0'});
  S(music,{opacity:'0'});
  S(h1,{opacity:'0'});
  S(eye,{opacity:'0'});
  S(tag,{opacity:'0'});
  socs.forEach(s=>S(s,{opacity:'0'}));

  /* ── STEP 0 : stars fade in ── */
  anim({from:0,to:1,ms:1000,delay:0,ease:E.outCubic, tick:v=>window._starReveal(v)});

  /* ── STEP 1 : loading bar fills (0→900ms) ── */
  anim({from:0,to:100,ms:900,delay:0,ease:E.inOutCubic,
    tick:v=>{ ibar.style.width=v+'%'; }
  });

  /* ── STEP 2 : logo text + sub appear (300ms) ── */
  anim({from:0,to:1,ms:600,delay:300,ease:E.outBack,
    tick:v=>{
      itext.style.opacity=v;
      itext.style.transform=`scale(${.85+.15*E.outBack(v)})`;
      itext.style.letterSpacing=(24+8*(1-v))+'px';
    }
  });
  anim({from:0,to:1,ms:500,delay:600,ease:E.outCubic,
    tick:v=>{isub.style.opacity=v;}
  });

  /* ── STEP 3 : logo glows, then overlay SLAMS out with clip-path iris wipe (1100ms) ── */
  anim({from:0,to:1,ms:300,delay:1000,ease:E.outExpo,
    tick:v=>{ itext.style.textShadow=`0 0 ${60*v}px rgba(255,255,255,${v}), 0 0 ${120*v}px rgba(255,255,255,${v*.4})`; }
  });
  anim({from:1,to:0,ms:200,delay:1300,ease:E.inExpo,
    tick:v=>{ itext.style.textShadow=`0 0 ${60*v}px rgba(255,255,255,${v})`; }
  });

  /* iris wipe: overlay shrinks from center */
  anim({from:0,to:1,ms:700,delay:1200,ease:E.inOutQuart,
    tick:v=>{
      const p=Math.round(v*100);
      intro.style.clipPath=`circle(${100-p*1.42}% at 50% 50%)`;
      intro.style.opacity=1-v*.6;
    },
    done:()=>{ intro.style.display='none'; }
  });

  /* scene fades in simultaneously */
  anim({from:0,to:1,ms:600,delay:1200,ease:E.outCubic,
    tick:v=>{ scene.style.opacity=v; }
  });

  /* ── STEP 4 : RING explodes in from Z-depth (1500ms) ── */
  anim({from:0,to:1,ms:1100,delay:1500,ease:E.outElastic,
    tick:v=>{
      const sc = E.outBack(Math.min(v*1.15,1));
      const tz = -300*(1-E.outQuart(v));
      const ry = 180*(1-E.outQuart(v));
      const op = Math.min(v*3,1);
      S(elRing,{
        opacity:op,
        transform:`perspective(800px) translateZ(${tz}px) rotateY(${ry}deg) scale(${sc})`
      });
    },
    done:()=>S(elRing,{transform:'',opacity:'1'})
  });

  /* ── STEP 5 : eyebrow types in char by char (2000ms) ── */
  const eyeTxt = '// LINK TREE — 2026';
  eye.textContent = '';
  S(eye,{opacity:'1'});
  setTimeout(()=>{
    let i=0;
    const iv=setInterval(()=>{
      eye.textContent = eyeTxt.slice(0,++i)+(i<eyeTxt.length?'▋':'');
      if(i>=eyeTxt.length){eye.textContent=eyeTxt;clearInterval(iv);}
    },32);
  }, 2000);

  /* ── STEP 6 : H1 "LEER" slams in with massive 3D rotate + letter-spacing collapse (2350ms) ── */
  S(elTitle,{opacity:'1'});
  S(h1,{
    opacity:'0',
    transform:'perspective(800px) rotateX(-80deg) rotateY(25deg) translateZ(-200px)',
    letterSpacing:'80px',
    filter:'blur(20px)'
  });
  anim({from:0,to:1,ms:1000,delay:2350,ease:E.outBack,
    tick:v=>{
      const rx  = -80*(1-E.outQuart(v));
      const ry  = 25*(1-E.outQuart(v));
      const tz  = -200*(1-v);
      const ls  = 80-(80-22)*E.outExpo(v);
      const bl  = 20*(1-E.outQuart(v));
      S(h1,{
        opacity: Math.min(v*2,1),
        transform:`perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(${tz}px)`,
        letterSpacing:`${ls}px`,
        filter:`blur(${bl}px)`
      });
    },
    done:()=>S(h1,{transform:'',filter:'',opacity:'1',letterSpacing:'22px'})
  });

  /* ── STEP 7 : tagline fades up (3100ms) ── */
  anim({from:0,to:1,ms:600,delay:3100,ease:E.outCubic,
    tick:v=>S(tag,{opacity:v, transform:`translateY(${12*(1-v)}px)`})
  });

  /* ── STEP 8 : social icons fly in from below, each with 3D flip (3300ms) ── */
  S(elSoc,{opacity:'1'});
  socs.forEach((s,i)=>{
    S(s,{opacity:'0',transform:'perspective(300px) rotateX(90deg) translateY(40px) scale(.5)'});
    anim({from:0,to:1,ms:700,delay:3300+i*70,ease:E.outElastic,
      tick:v=>{
        const rx = 90*(1-E.outQuart(v));
        const y  = 40*(1-v);
        const sc = .5+.5*E.outBack(Math.min(v*1.1,1));
        S(s,{opacity:Math.min(v*2,1), transform:`perspective(300px) rotateX(${rx}deg) translateY(${y}px) scale(${sc})`});
      },
      done:()=>S(s,{transform:'',opacity:'1'})
    });
  });

  /* ── STEP 9 : cards cascade — each flies in with full 3D tumble (3700ms) ── */
  cards.forEach((c,i)=>{
    /* each card comes from a slightly different angle for variety */
    const startRX = [-45,-50,-40,-55,-42,-48][i];
    const startRY = [-30,20,-25,30,-20,25][i];
    const startTX = [-80,80,-60,60,-70,70][i];
    const startTZ = -150;

    S(c,{
      opacity:'0',
      transform:`perspective(700px) rotateX(${startRX}deg) rotateY(${startRY}deg) translateX(${startTX}px) translateZ(${startTZ}px)`
    });

    anim({from:0,to:1,ms:900,delay:3700+i*100,ease:E.outBack,
      tick:v=>{
        const eq  = E.outExpo(v);
        const rx  = startRX*(1-eq);
        const ry  = startRY*(1-eq);
        const tx  = startTX*(1-eq);
        const tz  = startTZ*(1-eq);
        const sc  = .75+.25*E.outBack(Math.min(v*1.1,1));
        S(c,{
          opacity: Math.min(v*2.5,1),
          transform:`perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) translateX(${tx}px) translateZ(${tz}px) scale(${sc})`
        });
      },
      done:()=>S(c,{transform:'',opacity:'1'})
    });
  });

  /* ── STEP 10 : footer slides up (4700ms) ── */
  anim({from:0,to:1,ms:700,delay:4700,ease:E.outCubic,
    tick:v=>S(elFoot,{opacity:v,transform:`translateY(${18*(1-v)}px)`})
  });

  /* ── STEP 11 : music pill slides up from bottom-right (4900ms) ── */
  S(music,{transform:'translateY(40px) scale(.8)',opacity:'0'});
  anim({from:0,to:1,ms:700,delay:4900,ease:E.outBack,
    tick:v=>S(music,{opacity:v, transform:`translateY(${40*(1-v)}px) scale(${.8+.2*E.outBack(v)})`}),
    done:()=>S(music,{transform:'',opacity:'1'})
  });

})();

/* ════════════════════════════════════════
   3D TILT — CARDS
════════════════════════════════════════ */
document.querySelectorAll('.card').forEach(card=>{
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const rx=((e.clientY-r.top)/r.height-.5)*15;
    const ry=-((e.clientX-r.left)/r.width-.5)*20;
    S(card,{transform:`perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(10px) scale(1.02)`,
      boxShadow:`${-ry*.35}px ${rx*.35}px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.13)`});
  });
  card.addEventListener('mouseleave',()=>{
    S(card,{transform:'',boxShadow:'0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.07)'});
  });
});

/* ════════════════════════════════════════
   3D TILT — SOCIALS
════════════════════════════════════════ */
document.querySelectorAll('.soc').forEach(soc=>{
  soc.addEventListener('mousemove',e=>{
    const r=soc.getBoundingClientRect();
    const rx=((e.clientY-r.top)/r.height-.5)*34;
    const ry=-((e.clientX-r.left)/r.width-.5)*34;
    S(soc,{transform:`perspective(200px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(18px) scale(1.15)`});
  });
  soc.addEventListener('mouseleave',()=>S(soc,{transform:''}));
});

/* ════════════════════════════════════════
   STAGE PARALLAX
════════════════════════════════════════ */
const stage=document.querySelector('.stage');
let ptx=0,pty=0,stx=0,sty=0;
document.addEventListener('mousemove',e=>{ptx=(e.clientX/innerWidth-.5)*5;pty=(e.clientY/innerHeight-.5)*3;});
(function lp(){stx+=(ptx-stx)*.055;sty+=(pty-sty)*.055;stage.style.transform=`rotateY(${stx}deg) rotateX(${-sty}deg)`;requestAnimationFrame(lp);})();

/* ════════════════════════════════════════
   RINGS
════════════════════════════════════════ */
const rings=document.querySelectorAll('.ring');
const rb=['','rotateX(60deg)','rotateX(120deg)','rotateX(80deg) rotateZ(45deg)'];
const rs=[1.8,2.5,2.1,3.2],rd=[1,-1,1,-1];
let ra=[0,0,0,0];
(function lp(){
  ra=ra.map((a,i)=>a+rs[i]*rd[i]*.4);
  rings.forEach((r,i)=>r.style.transform=`${rb[i]} rotate(${ra[i]}deg)`);
  requestAnimationFrame(lp);
})();

/* ════════════════════════════════════════
   YOUTUBE
════════════════════════════════════════ */
var yt=document.createElement('script');yt.src='https://www.youtube.com/iframe_api';document.head.appendChild(yt);
var player,started=false;
function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{height:'0',width:'0',videoId:'DZ47H84Bc_Q',
    playerVars:{autoplay:1,mute:0,loop:1,playlist:'DZ47H84Bc_Q',controls:0,rel:0},
    events:{
      onReady:e=>{e.target.setVolume(45);e.target.playVideo();},
      onStateChange:e=>{
        const p=e.data===1;
        document.getElementById('mico').className=p?'fa-solid fa-pause':'fa-solid fa-play';
        document.getElementById('eq').classList.toggle('on',p);
        document.getElementById('npd').classList.toggle('on',p);
        if(p)started=true;
      }
    }
  });
}
document.body.addEventListener('click',()=>{if(!started&&player?.playVideo){player.playVideo();started=true;}},{once:true});
function toggleMusic(e){e.stopPropagation();if(!player)return;player.getPlayerState()===1?player.pauseVideo():(player.playVideo(),started=true);}
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEER</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--vc:#862ea2;--vl:#bd71d7;--vg:#e0abf0;--vd:#3d0f47;--vx:#26062d;--wh:#f5f0f7;--gr:#c0b8cc;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;font-family:'Share Tech Mono',monospace;color:var(--wh);cursor:none;background:#0a000f;}
#cur{position:fixed;width:10px;height:10px;border-radius:50%;background:var(--vg);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 14px var(--vl),0 0 28px rgba(189,113,215,.4);transition:width .15s,height .15s;}
#cur2{position:fixed;width:32px;height:32px;border-radius:50%;border:1px solid rgba(189,113,215,.3);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}
#c{position:fixed;inset:0;z-index:0;}
#intro{position:fixed;inset:0;z-index:300;background:#0a000f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;pointer-events:none;}
#ibar-wrap{width:200px;height:1px;background:rgba(189,113,215,.12);position:relative;}
#ibar{position:absolute;left:0;top:0;height:1px;width:0%;background:linear-gradient(90deg,var(--vd),var(--vc),var(--vl),var(--vg));box-shadow:0 0 16px var(--vl),0 0 40px rgba(134,46,162,.5);}
#itext{font-family:'Orbitron',sans-serif;font-weight:900;font-size:5rem;letter-spacing:28px;color:transparent;background:linear-gradient(135deg,var(--wh) 0%,var(--vg) 40%,var(--vl) 70%,var(--vc) 100%);-webkit-background-clip:text;background-clip:text;opacity:0;transform:scale(.75);}
#isub{font-size:.54rem;letter-spacing:10px;color:rgba(224,171,240,.3);opacity:0;text-transform:uppercase;}
#ieye-wrap{position:relative;width:70px;height:70px;opacity:0;}
#ieye-img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:1px solid rgba(134,46,162,.4);}
.ieye-ring{position:absolute;inset:-4px;border-radius:50%;border:1px solid transparent;animation:iring 2s linear infinite;}
.ieye-ring:nth-child(1){border-color:rgba(134,46,162,.6) transparent transparent;}
.ieye-ring:nth-child(2){border-color:transparent rgba(189,113,215,.5) transparent;animation-duration:1.4s;animation-direction:reverse;}
@keyframes iring{to{transform:rotate(360deg);}}
#scene{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 16px 90px;perspective:1400px;perspective-origin:50% 38%;opacity:0;}
.stage{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;transform-style:preserve-3d;}
.ring-wrap{position:relative;width:130px;height:130px;margin-bottom:26px;transform-style:preserve-3d;opacity:0;}
.ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid transparent;}
.ring:nth-child(1){border-color:rgba(189,113,215,.7) transparent transparent transparent;}
.ring:nth-child(2){border-color:transparent rgba(134,46,162,.5) transparent transparent;}
.ring:nth-child(3){border-color:transparent transparent rgba(224,171,240,.6) transparent;}
.ring:nth-child(4){border-color:rgba(134,46,162,.35) transparent transparent transparent;}
.av{position:absolute;inset:10px;border-radius:50%;border:1.5px solid rgba(189,113,215,.3);overflow:hidden;box-shadow:0 0 30px rgba(134,46,162,.2),0 0 60px rgba(134,46,162,.1),inset 0 0 20px rgba(224,171,240,.05);}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;filter:saturate(1.1);}
.title-block{text-align:center;margin-bottom:22px;opacity:0;}
.eye{font-size:.52rem;letter-spacing:8px;color:rgba(189,113,215,.35);text-transform:uppercase;margin-bottom:10px;}
h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:4.8rem;letter-spacing:24px;color:transparent;background:linear-gradient(135deg,var(--wh) 0%,var(--vg) 40%,var(--vl) 75%,var(--vc) 100%);-webkit-background-clip:text;background-clip:text;position:relative;display:inline-block;filter:drop-shadow(0 0 30px rgba(134,46,162,.3));}
h1::before,h1::after{content:attr(data-text);position:absolute;top:0;left:0;background:inherit;-webkit-background-clip:text;background-clip:text;color:transparent;}
h1::before{clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:ga 7s infinite;opacity:0;}
h1::after{clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);animation:gb 7s infinite;opacity:0;}
@keyframes ga{0%,88%,100%{opacity:0;}90%{transform:translateX(-5px);opacity:.7;}92%{transform:translateX(5px);opacity:.5;}94%{opacity:0;}}
@keyframes gb{0%,89%,100%{opacity:0;}91%{transform:translateX(5px);opacity:.6;}93%{transform:translateX(-4px);opacity:.4;}95%{opacity:0;}}
.tag{font-size:.55rem;letter-spacing:4px;color:rgba(189,113,215,.2);margin-top:6px;text-transform:uppercase;}
.stats-row{display:flex;gap:0;margin-bottom:22px;opacity:0;width:100%;}
.stat-item{flex:1;text-align:center;padding:14px 8px;background:rgba(134,46,162,.05);border:1px solid rgba(134,46,162,.1);position:relative;overflow:hidden;transition:all .3s;cursor:default;}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(189,113,215,.4),transparent);opacity:0;transition:opacity .3s;}
.stat-item:hover::before{opacity:1;}
.stat-item:hover{background:rgba(134,46,162,.1);border-color:rgba(189,113,215,.2);}
.stat-item:first-child{border-radius:12px 0 0 12px;}
.stat-item:last-child{border-radius:0 12px 12px 0;}
.stat-val{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:700;color:var(--vl);display:block;text-shadow:0 0 12px rgba(189,113,215,.4);}
.stat-lbl{font-size:.42rem;letter-spacing:3px;color:rgba(189,113,215,.3);text-transform:uppercase;margin-top:3px;display:block;}
.stat-sep{width:1px;background:rgba(134,46,162,.15);}
.soc-row{display:flex;gap:10px;margin-bottom:22px;opacity:0;}
.soc{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;text-decoration:none;color:rgba(224,171,240,.45);background:rgba(134,46,162,.06);border:1px solid rgba(134,46,162,.12);backdrop-filter:blur(12px);transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:none;position:relative;overflow:hidden;}
.soc::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);border-radius:14px 14px 0 0;pointer-events:none;}
.soc:hover{background:rgba(134,46,162,.18);border-color:rgba(189,113,215,.35);color:var(--vg);box-shadow:0 8px 28px rgba(134,46,162,.25),inset 0 1px 0 rgba(255,255,255,.1);}
.links{width:100%;display:flex;flex-direction:column;gap:8px;}
.card{display:flex;align-items:center;text-decoration:none;color:var(--wh);padding:15px 18px;border-radius:16px;background:rgba(134,46,162,.055);border:1px solid rgba(134,46,162,.12);backdrop-filter:blur(20px) saturate(140%);box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.055);transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:none;position:relative;overflow:hidden;opacity:0;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:16px 16px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent);pointer-events:none;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 36%,rgba(189,113,215,.06) 50%,transparent 64%);transform:translateX(-130%);transition:transform .6s ease;pointer-events:none;}
.card:hover::after{transform:translateX(160%);}
.card:hover{background:rgba(134,46,162,.12);border-color:rgba(189,113,215,.25);box-shadow:0 12px 40px rgba(134,46,162,.15),inset 0 1px 0 rgba(255,255,255,.08);}
.ci{width:42px;height:42px;border-radius:11px;background:rgba(134,46,162,.1);border:1px solid rgba(134,46,162,.18);display:flex;align-items:center;justify-content:center;font-size:1.05rem;color:rgba(189,113,215,.45);margin-right:15px;flex-shrink:0;position:relative;overflow:hidden;backdrop-filter:blur(8px);transition:all .3s;}
.ci::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);border-radius:11px 11px 0 0;}
.ci i,.ci .gi{position:relative;z-index:1;transition:text-shadow .3s;}
.card:hover .ci{background:rgba(134,46,162,.22);border-color:rgba(189,113,215,.35);color:var(--vg);}
.card:hover .ci i,.card:hover .ci .gi{text-shadow:0 0 16px var(--vl);}
.gi{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.88rem;transform:rotate(-10deg) skewX(-5deg);display:block;}
.ct{flex:1;display:flex;flex-direction:column;gap:2px;}
.cs{font-size:.48rem;letter-spacing:3px;color:rgba(189,113,215,.25);text-transform:uppercase;transition:color .3s;}
.card:hover .cs{color:rgba(189,113,215,.45);}
.cn{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:4px;color:rgba(224,171,240,.55);transition:color .3s,text-shadow .3s;}
.card:hover .cn{color:var(--wh);text-shadow:0 0 16px rgba(189,113,215,.3);}
.ca{margin-left:auto;display:flex;align-items:center;gap:4px;color:rgba(134,46,162,.25);font-size:.58rem;transition:all .3s;transform:translateX(-3px);}
.al{width:14px;height:1px;background:rgba(134,46,162,.25);transition:all .3s;}
.card:hover .ca{color:rgba(189,113,215,.6);transform:translateX(4px);}
.card:hover .al{background:rgba(189,113,215,.5);width:22px;}
.quote-block{width:100%;margin:6px 0;opacity:0;}
.quote-inner{padding:16px 20px;border-radius:14px;background:rgba(134,46,162,.05);border:1px solid rgba(134,46,162,.1);border-left:2px solid rgba(189,113,215,.4);position:relative;overflow:hidden;backdrop-filter:blur(10px);}
.quote-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,rgba(189,113,215,.3),transparent);}
.quote-text{font-family:'Rajdhani',sans-serif;font-size:.88rem;font-weight:300;color:rgba(224,171,240,.4);letter-spacing:2px;font-style:italic;line-height:1.7;}
.quote-author{font-size:.44rem;letter-spacing:4px;color:rgba(134,46,162,.4);text-transform:uppercase;margin-top:8px;}
.foot{margin-top:24px;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;}
.foot-line{display:flex;align-items:center;gap:12px;}
.foot-sep{width:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(134,46,162,.2),transparent);}
.foot-txt{font-size:.44rem;letter-spacing:5px;color:rgba(134,46,162,.2);text-transform:uppercase;}
.foot-diamond{width:5px;height:5px;background:rgba(134,46,162,.25);transform:rotate(45deg);}
#music{position:fixed;bottom:22px;right:22px;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 18px;border-radius:50px;background:rgba(10,0,15,.7);border:1px solid rgba(134,46,162,.18);backdrop-filter:blur(30px);font-size:.57rem;letter-spacing:1px;color:rgba(189,113,215,.3);cursor:none;transition:all .3s;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);opacity:0;}
#music:hover{border-color:rgba(189,113,215,.35);color:rgba(189,113,215,.7);}
.npd{width:5px;height:5px;border-radius:50%;background:var(--vl);opacity:0;transition:opacity .3s;animation:blink 1.4s ease-in-out infinite;}
.npd.on{opacity:1;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.08;}}
.eq{display:flex;align-items:flex-end;gap:2px;height:13px;}
.eq span{display:block;width:2px;background:var(--vl);border-radius:1px;opacity:0;transition:opacity .3s;animation:eqb .7s ease-in-out infinite alternate;}
.eq span:nth-child(1){height:5px;}.eq span:nth-child(2){height:11px;animation-delay:.1s;}.eq span:nth-child(3){height:7px;animation-delay:.2s;}.eq span:nth-child(4){height:13px;animation-delay:.08s;}.eq span:nth-child(5){height:4px;animation-delay:.18s;}
.eq.on span{opacity:.7;}
@keyframes eqb{from{transform:scaleY(.15);}to{transform:scaleY(1);}}
#player{display:none;}
</style>
</head>

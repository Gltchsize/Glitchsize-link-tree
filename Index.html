<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEER | Link Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #00f5ff;
            --magenta: #ff006e;
            --purple: #7b2ff7;
            --gold: #ffd700;
            --dark: #020008;
            --darker: #010005;
            --card-bg: rgba(255,255,255,0.02);
            --glow-cyan: 0 0 30px rgba(0, 245, 255, 0.5);
            --glow-mag: 0 0 30px rgba(255, 0, 110, 0.5);
            --glow-purple: 0 0 30px rgba(123, 47, 247, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* ─── NOISE GRAIN OVERLAY ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 200px;
            opacity: 0.4;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.06) 3px,
                rgba(0,0,0,0.06) 4px
            );
            z-index: 2;
            pointer-events: none;
        }

        /* ─── ANIMATED BACKGROUND ─── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── VIGNETTE ─── */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
            z-index: 3;
            pointer-events: none;
        }

        /* ─── CONTENT WRAPPER ─── */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── AVATAR RING ─── */
        .avatar-ring {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            margin-bottom: 28px;
            position: relative;
            animation: avatar-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes avatar-in {
            from { opacity: 0; transform: scale(0.5) rotate(-180deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan), var(--purple), var(--magenta), var(--cyan));
            animation: spin 4s linear infinite;
            z-index: -1;
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(var(--cyan), var(--purple), var(--magenta), var(--cyan));
            animation: spin 4s linear infinite reverse;
            z-index: -2;
            opacity: 0.3;
            filter: blur(4px);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a0033, #000520);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.4);
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            border: 2px solid var(--dark);
        }

        /* ─── HEADER ─── */
        .header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .header-tag {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 6px;
            color: var(--cyan);
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.5;
            animation: fade-in 1s 0.3s both;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 0.5; transform: translateY(0); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 16px;
            position: relative;
            display: inline-block;
            color: #fff;
            text-shadow: 0 0 40px rgba(0,245,255,0.4), 0 0 80px rgba(0,245,255,0.15), 0 0 120px rgba(123,47,247,0.1);
            animation: title-in 1s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes title-in {
            from { opacity: 0; transform: scale(0.7) translateY(-20px); letter-spacing: 40px; }
            to   { opacity: 1; transform: scale(1) translateY(0); letter-spacing: 16px; }
        }

        /* Glitch layers */
        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            overflow: hidden;
        }
        h1::before {
            color: var(--cyan);
            animation: glitch-top 4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
            transform: translateX(-2px);
            opacity: 0;
        }
        h1::after {
            color: var(--magenta);
            animation: glitch-bot 4s infinite;
            clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%);
            transform: translateX(2px);
            opacity: 0;
        }

        @keyframes glitch-top {
            0%, 88%, 100% { transform: translateX(0); opacity: 0; }
            90% { transform: translateX(-4px) skewX(2deg); opacity: 0.9; }
            92% { transform: translateX(4px) skewX(-2deg); opacity: 0.7; }
            94% { transform: translateX(-2px); opacity: 0.8; }
            96% { transform: translateX(0); opacity: 0; }
        }
        @keyframes glitch-bot {
            0%, 89%, 100% { transform: translateX(0); opacity: 0; }
            91% { transform: translateX(4px) skewX(-2deg); opacity: 0.8; }
            93% { transform: translateX(-4px) skewX(2deg); opacity: 0.9; }
            95% { transform: translateX(2px); opacity: 0.6; }
            97% { transform: translateX(0); opacity: 0; }
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            animation: fade-in 1s 0.8s both;
        }

        /* Decorative separator */
        .sep {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px auto 0;
            animation: fade-in 1s 1s both;
        }
        .sep-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan));
        }
        .sep-line.r { background: linear-gradient(90deg, var(--magenta), transparent); }
        .sep-diamond {
            width: 6px; height: 6px;
            background: var(--cyan);
            transform: rotate(45deg);
            box-shadow: 0 0 10px var(--cyan);
            animation: diamond-pulse 2s ease-in-out infinite;
        }
        @keyframes diamond-pulse {
            0%,100% { transform: rotate(45deg) scale(1); box-shadow: 0 0 8px var(--cyan); }
            50% { transform: rotate(45deg) scale(1.4); box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,245,255,0.3); }
        }

        /* ─── LINKS ─── */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 3px;
            background: rgba(255,255,255,0.018);
            border: 1px solid rgba(255,255,255,0.06);
            border-left: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: card-in 0.7s both;
            backdrop-filter: blur(4px);
        }

        .link-card:nth-child(1) { animation-delay: 0.15s; }
        .link-card:nth-child(2) { animation-delay: 0.25s; }
        .link-card:nth-child(3) { animation-delay: 0.35s; }
        .link-card:nth-child(4) { animation-delay: 0.45s; }
        .link-card:nth-child(5) { animation-delay: 0.55s; }
        .link-card:nth-child(6) { animation-delay: 0.65s; }

        @keyframes card-in {
            from { opacity: 0; transform: translateX(-30px) skewX(4deg); }
            to   { opacity: 1; transform: translateX(0) skewX(0deg); }
        }

        /* Left accent bar */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px;
            height: 100%;
            background: var(--accent, var(--cyan));
            opacity: 0.4;
            transition: opacity 0.3s, width 0.3s, box-shadow 0.3s;
        }

        /* Corner glows */
        .link-card .corner-tl, .link-card .corner-br {
            position: absolute;
            width: 8px; height: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .link-card .corner-tl {
            top: 0; left: 0;
            border-top: 1px solid var(--accent, var(--cyan));
            border-left: 1px solid var(--accent, var(--cyan));
        }
        .link-card .corner-br {
            bottom: 0; right: 0;
            border-bottom: 1px solid var(--accent, var(--cyan));
            border-right: 1px solid var(--accent, var(--cyan));
        }

        /* Shine sweep */
        .link-card::after {
            content: '';
            position: absolute;
            top: 0; left: -120%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 0.6s ease;
        }

        .link-card:hover::after { left: 160%; }
        .link-card:hover::before { opacity: 1; width: 3px; box-shadow: 0 0 12px var(--accent, var(--cyan)); }
        .link-card:hover .corner-tl, .link-card:hover .corner-br { opacity: 1; }

        .link-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.12);
            transform: translateX(8px);
            box-shadow: -6px 0 30px rgba(0, 0, 0, 0.5), inset 0 0 40px rgba(255,255,255,0.015);
        }

        /* Icon wrapper */
        .icon-wrap {
            width: 38px;
            height: 38px;
            border-radius: 2px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
            flex-shrink: 0;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .icon-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent, var(--cyan));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-card:hover .icon-wrap {
            border-color: var(--accent, var(--cyan));
            box-shadow: 0 0 16px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.03);
        }
        .link-card:hover .icon-wrap::before { opacity: 0.08; }

        .link-card i, .link-card .leer-icon {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.3);
            transition: color 0.3s, text-shadow 0.3s;
            position: relative;
            z-index: 1;
        }

        .leer-icon {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 0.9rem;
            transform: rotate(-10deg) skewX(-5deg);
            display: block;
        }

        .link-card:hover i, .link-card:hover .leer-icon {
            color: var(--accent, var(--cyan));
            text-shadow: 0 0 16px var(--accent, var(--cyan)), 0 0 30px rgba(0,245,255,0.3);
        }

        /* Text block */
        .link-text-wrap {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .link-card:hover .link-label { color: rgba(255,255,255,0.35); }

        .link-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.7);
            transition: color 0.3s, text-shadow 0.3s;
        }

        .link-card:hover .link-text {
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        /* Arrow */
        .link-arrow {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .arrow-line {
            width: 20px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
            transform-origin: left center;
        }
        .arrow-head {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.1);
            transition: all 0.3s;
            transform: translateX(-4px);
        }
        .link-card:hover .arrow-line {
            background: var(--accent, var(--cyan));
            box-shadow: 0 0 6px var(--accent, var(--cyan));
            width: 26px;
        }
        .link-card:hover .arrow-head {
            color: var(--accent, var(--cyan));
            transform: translateX(2px);
            text-shadow: 0 0 8px var(--accent, var(--cyan));
        }

        /* Per-card accents */
        .link-card.czone     { --accent: #00ff88; }
        .link-card.instagram { --accent: #f56040; }
        .link-card.twitter   { --accent: #1DA1F2; }
        .link-card.tiktok    { --accent: #00f2ea; }
        .link-card.twitch    { --accent: #9146FF; }
        .link-card.discord   { --accent: #5865F2; }

        /* ─── STATS ROW ─── */
        .stats-row {
            display: flex;
            gap: 24px;
            margin-top: 32px;
            margin-bottom: 0;
            animation: fade-in 0.8s 0.8s both;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--cyan);
            text-shadow: 0 0 12px rgba(0,245,255,0.4);
        }

        .stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stat-divider {
            width: 1px;
            height: 28px;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        /* ─── MUSIC PLAYER ─── */
        #music-control {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(2, 0, 8, 0.8);
            border: 1px solid rgba(0,245,255,0.15);
            padding: 10px 18px;
            border-radius: 2px;
            cursor: pointer;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 1px;
            z-index: 100;
            backdrop-filter: blur(20px);
            overflow: hidden;
        }

        #music-control::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            opacity: 0.4;
        }

        #music-control:hover {
            border-color: rgba(0,245,255,0.4);
            color: var(--cyan);
            box-shadow: 0 0 30px rgba(0,245,255,0.1), inset 0 0 20px rgba(0,245,255,0.03);
        }

        #music-icon { font-size: 0.7rem; }

        .now-playing-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            animation: blink 1.5s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .now-playing-dot.active { opacity: 1; }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* Equalizer bars */
        .eq-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 14px;
        }
        .eq-bars span {
            display: block;
            width: 2px;
            background: var(--cyan);
            border-radius: 1px;
            animation: eq 0.7s ease-in-out infinite alternate;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .eq-bars span:nth-child(1) { height: 5px; animation-delay: 0s; }
        .eq-bars span:nth-child(2) { height: 11px; animation-delay: 0.12s; }
        .eq-bars span:nth-child(3) { height: 7px; animation-delay: 0.25s; }
        .eq-bars span:nth-child(4) { height: 13px; animation-delay: 0.08s; }
        .eq-bars span:nth-child(5) { height: 4px; animation-delay: 0.2s; }
        .eq-bars.playing span { opacity: 1; }

        @keyframes eq {
            from { transform: scaleY(0.2); }
            to   { transform: scaleY(1); }
        }

        /* ─── FOOTER ─── */
        .footer {
            margin-top: 40px;
            text-align: center;
            animation: fade-in 0.8s 1.2s both;
        }

        .footer-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.1);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .footer-accent {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .footer-dot {
            width: 3px; height: 3px;
            background: rgba(0,245,255,0.3);
            border-radius: 50%;
        }

        /* ─── CURSOR TRAIL ─── */
        .cursor-dot {
            position: fixed;
            width: 6px; height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.8;
            transition: transform 0.1s;
            box-shadow: 0 0 10px var(--cyan);
            transform: translate(-50%, -50%);
        }

        #player { display: none; }
    </style>
</head>

    <script>
    /* ─── CURSOR ─── */
    const dot = document.getElementById('cursor-dot');
    let mx = -100, my = -100;
    document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
    });

    /* ─── CANVAS BACKGROUND ─── */
    (function() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        /* Floating orbs */
        const orbs = [
            { x: 0.15, y: 0.2, r: 260, hue: 280, op: 0.07, vx: 0.0002, vy: 0.0001 },
            { x: 0.85, y: 0.75, r: 200, hue: 190, op: 0.06, vx: -0.0003, vy: -0.0002 },
            { x: 0.5,  y: 0.5,  r: 300, hue: 310, op: 0.04, vx: 0.0001, vy: 0.0003 },
            { x: 0.8,  y: 0.15, r: 150, hue: 240, op: 0.05, vx: -0.0002, vy: 0.0002 },
        ].map(o => ({ ...o, ox: o.x, oy: o.y, t: Math.random() * Math.PI * 2 }));

        /* Floating glyphs */
        const CHARS = ['彡', '月', '夢', '光', '影', '空', '星', '刃', '力', '∞', '◈', '⬡', '△', '◇', '※', '⊕', '⟁', '⌬'];
        const particles = Array.from({length: 30}, () => ({
            x: Math.random(),
            y: Math.random(),
            char: CHARS[Math.floor(Math.random() * CHARS.length)],
            size: 10 + Math.random() * 16,
            opacity: 0.03 + Math.random() * 0.07,
            vy: -0.00015 - Math.random() * 0.0002,
            vx: (Math.random() - 0.5) * 0.00005,
            color: [
                'rgba(0,245,255,1)',
                'rgba(123,47,247,1)',
                'rgba(255,0,110,0.7)'
            ][Math.floor(Math.random() * 3)],
            rot: Math.random() * Math.PI * 2,
            rs: (Math.random() - 0.5) * 0.003,
        }));

        /* Horizontal scan lines (fast) */
        const scanlines = Array.from({length: 3}, () => ({
            y: Math.random(),
            speed: 0.0003 + Math.random() * 0.0005,
            opacity: 0.04 + Math.random() * 0.04,
            color: Math.random() > 0.5 ? '#00f5ff' : '#ff006e',
            width: 0.3 + Math.random() * 0.4,
        }));

        /* Grid */
        function drawGrid(w, h) {
            const sp = 55;
            ctx.strokeStyle = 'rgba(0,245,255,0.018)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x < w; x += sp) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }
            for (let y = 0; y < h; y += sp) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
        }

        let t = 0;
        function tick() {
            t += 0.005;
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            drawGrid(W, H);

            // Orbs
            orbs.forEach(o => {
                o.t += 0.008;
                const x = (o.ox + Math.sin(o.t * 0.7) * 0.06) * W;
                const y = (o.oy + Math.cos(o.t * 0.5) * 0.08) * H;
                const r = o.r + Math.sin(o.t) * 20;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, `hsla(${o.hue},100%,60%,${o.op})`);
                g.addColorStop(0.5, `hsla(${o.hue},100%,60%,${o.op * 0.4})`);
                g.addColorStop(1, `hsla(${o.hue},100%,60%,0)`);
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            });

            // Scan lines
            scanlines.forEach(s => {
                s.y += s.speed;
                if (s.y > 1) s.y = 0;
                const y = s.y * H;
                const g = ctx.createLinearGradient(0, y - 1, 0, y + 2);
                g.addColorStop(0, 'transparent');
                g.addColorStop(0.5, s.color.replace(')', `,${s.opacity})`).replace('rgb', 'rgba'));
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.fillRect(W * (0.5 - s.width / 2), y - 1, W * s.width, 3);
            });

            // Glyphs
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.rot += p.rs;
                if (p.y < -0.05) { p.y = 1.05; p.x = Math.random(); }
                ctx.save();
                ctx.translate(p.x * W, p.y * H);
                ctx.rotate(p.rot);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.font = `${p.size}px serif`;
                ctx.textAlign = 'center';
                ctx.fillText(p.char, 0, 0);
                ctx.restore();
            });

            requestAnimationFrame(tick);
        }
        tick();
    })();

    /* ─── YOUTUBE ─── */
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var player;
    var musicStarted = false;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0', width: '0',
            videoId: 'DZ47H84Bc_Q',
            playerVars: { autoplay: 1, mute: 0, loop: 1, playlist: 'DZ47H84Bc_Q', controls: 0, rel: 0 },
            events: {
                onReady: e => { e.target.setVolume(45); e.target.playVideo(); },
                onStateChange: e => {
                    const playing = e.data === 1;
                    document.getElementById('music-icon').className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';
                    document.getElementById('eq-bars').classList.toggle('playing', playing);
                    document.getElementById('np-dot').classList.toggle('active', playing);
                    if (playing) musicStarted = true;
                }
            }
        });
    }

    document.body.addEventListener('click', function() {
        if (!musicStarted && player && typeof player.playVideo === 'function') {
            player.playVideo(); musicStarted = true;
        }
    }, { once: true });

    function toggleMusic(e) {
        e.stopPropagation();
        if (!player) return;
        player.getPlayerState() === 1 ? player.pauseVideo() : (player.playVideo(), musicStarted = true);
    }
    </script>

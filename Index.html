    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #111111 0%, #000000 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #666666);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-card i, .link-card .diagonal-g {
            font-size: 1.4rem;
            width: 30px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            color: #888;
            transition: color 0.3s ease;
        }

        .diagonal-g {
            font-weight: 800;
            transform: rotate(-15deg);
            font-style: normal;
        }

        .link-text {
            font-size: 1rem;
            font-weight: 500;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .link-card:hover i, .link-card:hover .diagonal-g {
            color: #ffffff;
        }

        /* Couleurs au survol */
        .link-card.czone:hover { border-color: #00ff88; }
        .link-card.czone:hover .diagonal-g { color: #00ff88; }
        .link-card.instagram:hover i { color: #E1306C; }
        .link-card.twitter:hover i { color: #1DA1F2; }
        .link-card.tiktok:hover i { color: #00f2ea; }
        .link-card.twitch:hover i { color: #9146FF; }
        .link-card.discord:hover i { color: #5865F2; }

        /* Lecteur Musique Discret */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            color: #888;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        #music-control:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>𝐆𝐋𝐈𝐓𝐂𝐇𝐒𝐈𝐙𝐄</h1>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var musicStarted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'DZ47H84Bc_Q',
                playerVars: {
                    'autoplay': 1, // Activé ici
                    'mute': 0,
                    'loop': 1,
                    'playlist': 'DZ47H84Bc_Q',
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(50);
            // Tente de lancer la musique immédiatement (marchera si l'utilisateur a déjà interagi)
            event.target.playVideo();
        }

        // Sécurité : Démarre au premier clic n'importe où si le navigateur a bloqué l'autoplay
        document.body.addEventListener('click', function() {
            if (!musicStarted && player && typeof player.playVideo === 'function') {
                player.playVideo();
                document.getElementById('music-icon').className = "fa-solid fa-pause";
                musicStarted = true;
            }
        }, { once: true });

        function toggleMusic(event) {
            event.stopPropagation();
            var icon = document.getElementById('music-icon');
            if (player.getPlayerState() == 1) { 
                player.pauseVideo();
                icon.className = "fa-solid fa-play";
            } else {
                player.playVideo();
                icon.className = "fa-solid fa-pause";
                musicStarted = true;
            }
        }
    </script>
